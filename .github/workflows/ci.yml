name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall src
      - name: Smoke test
        run: |
          pokefetch --list-themes
          pokefetch --theme compact-side --pokemon pikachu > /tmp/pokefetch.txt
          test -s /tmp/pokefetch.txt
