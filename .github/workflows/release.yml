name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Read version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as file:
              print(tomllib.load(file)['project']['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Skip existing release
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        if: steps.existing.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke test
        if: steps.existing.outputs.exists == 'false'
        run: |
          python -m pip install dist/*.whl
          pokefetch --list-themes
          pokefetch --theme compact-side --pokemon pikachu show > /tmp/pokefetch.txt
          test -s /tmp/pokefetch.txt
      - name: Create tag
        if: steps.existing.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      - name: Create GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" dist/* --generate-notes --title "${{ steps.version.outputs.tag }}"
